services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: catty_reminders
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmypass"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: ${IMAGE:-ghcr.io/only-hell/catty-reminders-app:latest}
    restart: always
    environment:
      - DEPLOY_REF=${DEPLOY_REF:-NA}
    ports:
      - "8181:8181"
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: