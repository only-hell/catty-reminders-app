services:
  db:
    image: mariadb:11
    container_name: ${DB_CONTAINER_NAME:-catty-db}
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-mypass}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-catty_reminders}
    ports:
      - "${HOST_DB_PORT:-3306}:${CONTEINER_DB_PORT:-3306}"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - catty-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: ${IMAGE:-catty-app:latest}
    container_name: ${APP_CONTAINER_NAME:-catty-app}
    restart: always
    environment:
      - DEPLOY_REF=${DEPLOY_REF:-unknown}
    ports: 
      - "${HOST_APP_PORT:-8181}:${CONTEINER_APP_PORT:-8181}"
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - catty-network

networks:
  catty-network:
    driver: bridge

volumes:
  db_data: