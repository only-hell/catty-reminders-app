services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: catty_reminders
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmypass"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/only-hell/catty-reminders-app:${IMAGE_TAG:-lab4}
    restart: always
    ports:
      - "8181:8181"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
