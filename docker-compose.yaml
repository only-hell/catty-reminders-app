version: '3.8'
services:
  app:
    build: .
    ports:
      - "8181:8181"
    environment:
      - DATABASE_URL=mysql+mysqlconnector://user:password@db/reminders
      - DEPLOY_REF=${DEPLOY_REF:-NA}
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=reminders
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:
