name: CI Pipeline

on:
  push:
    branches: [ "lab2", "main" ]
  pull_request:
    branches: [ "lab2", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Prepare environment (Mock .env)
        run: |
          # Создаем пустой .env файл, чтобы приложение не падало при попытке его прочитать
          touch .env

      - name: Run tests
        run: |
          # tee выведет результат тестов прямо в логи GitHub и одновременно сохранит в файл
          PYTHONPATH=. pytest | tee test_result.txt

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_result
          path: test_result.txt
