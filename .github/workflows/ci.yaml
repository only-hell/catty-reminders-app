name: CI/CD Pipeline

on:
  push:
    branches: [ "lab4-clean" ]

permissions:
  contents: read
  packages: write

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: reminders
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: |
          pip install -r requirements.txt
          pip install pytest-playwright
          playwright install --with-deps chromium
          # Создаем пустой отчет, если тестов пока нет, чтобы бот не падал
          echo '<?xml version="1.0" encoding="UTF-8"?><testsuites></testsuites>' > results.xml
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: results.xml

  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Пушим и SHA, и latest, чтобы Docker Compose всегда находил образ
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          chmod +x ./deploy.sh
          ./deploy.sh ${{ github.sha }}
