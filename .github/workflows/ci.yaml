name: CI Pipeline

on:
  push:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mypass
          MYSQL_DATABASE: catty_reminders
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pmypass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-playwright
          playwright install chromium

      - name: Update config for CI (localhost)
        run: |
          python3 -c "
          import json
          with open('config.json') as f:
              cfg = json.load(f)
          cfg['db_config']['host'] = 'localhost'
          with open('config.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          "

      - name: Start FastAPI server
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8181 &
          sleep 5

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest --junitxml=test_result.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_result
          path: test_result.xml

  build-docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/only-hell/catty-reminders-app:${{ github.sha }}
            ghcr.io/only-hell/catty-reminders-app:latest
            ghcr.io/only-hell/catty-reminders-app:lab4
          build-args: |
            DEPLOY_REF=${{ github.sha }}