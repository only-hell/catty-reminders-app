name: CI Pipeline
on:[push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: reminders
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest mysql-connector-python
          playwright install chromium
      - name: Run app in background
        run: |
          export PYTHONPATH=.
          export DATABASE_URL=mysql+mysqlconnector://root:password@127.0.0.1:3306/reminders
          nohup uvicorn app.main:app --port 8181 > app.log 2>&1 &
          sleep 5
      - name: Run tests
        run: |
          export PYTHONPATH=.
          export DATABASE_URL=mysql+mysqlconnector://root:password@127.0.0.1:3306/reminders
          pytest --junitxml=results.xml || echo "Tests failed, but XML generated"
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_result
          path: results.xml

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/only-hell/catty-reminders-app:latest
            ghcr.io/only-hell/catty-reminders-app:${{ github.sha }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}