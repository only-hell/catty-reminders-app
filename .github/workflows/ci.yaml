name: CI

on:
  push:
    branches: [lab2]
  pull_request:
    branches: [lab2]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-html

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Prepare runtime files
        run: |
          cp config.json reminder_db.json
          echo "JWT_SECRET=ci-test-secret-key-not-for-production" > .env

      - name: Start application
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8181 > app.log 2>&1 &
          echo $! > app.pid
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8181/login > /dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start"
          cat app.log
          exit 1

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ \
            --junitxml=test_result.xml \
            --html=test_result.html --self-contained-html \
            -v

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) 2>/dev/null || true
          fi

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: |
            test_result.xml
            test_result.html
            app.log