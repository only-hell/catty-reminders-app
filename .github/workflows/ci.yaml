name: Continuous Integration

on:
  push:
    branches: [ "lab3*" ]
  pull_request:
    branches: [ "lab3*" ]

jobs:
  code-quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Source Checkout
        uses: actions/checkout@v4

      - name: Python Environment Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Dependency Installation
        run: |
          pip install -r requirements.txt
          pip install pytest pylint

      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium

      - name: Lint with pylint
        continue-on-error: true
        run: pylint app/ --exit-zero

      - name: Start application in background
        env:
          PYTHONPATH: .
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8181/login > /dev/null; then
              echo "Server is up after $i seconds"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          cat uvicorn.log
          exit 1

      - name: Execution of Tests
        env:
          PYTHONPATH: .
        run: pytest tests/ --junitxml=results.xml

      - name: Show uvicorn logs on failure
        if: failure()
        run: cat uvicorn.log

      - name: Stop application
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill $(cat uvicorn.pid) || true
          fi

      - name: Test Report Archiving
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_result
          path: results.xml

  dockerfile-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Source Checkout
        uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true
        with:
          dockerfile: Dockerfile

  docker-build-and-push:
    needs: code-quality-and-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Source Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:latest
