name: CI Pipeline
on:
  push:
    branches: [ "lab3*" ]
  pull_request:
    branches: [ "lab3*" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      db:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: reminders
        ports:
          - 3306:3306
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest mysql-connector-python

      - name: Inject Bot User
        run: python -c "import json; d=json.load(open('config.json')); d.setdefault('users', {})['sa3000udp']='password'; json.dump(d, open('config.json','w'))"

      - name: Run Tests
        run: |
          export PYTHONPATH=.
          export DATABASE_URL=mysql+mysqlconnector://root:password@127.0.0.1:3306/reminders
          pytest tests/test_unit.py --junitxml=results.xml || true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_result
          path: results.xml

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: COMMIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:latest
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:${{ github.sha }}