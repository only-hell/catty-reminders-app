name: CI

on:
  push:
    branches:
      - "lab3*"
  pull_request:
    branches:
      - "lab3*"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest

      - name: Create config.json
        run: |
          cat > config.json << 'EOF'
          {
            "db_path": "reminder_db.json",
            "secret_key": "Cats are awesome!",
            "users": {
              "heisenberg": "P@ssw0rd",
              "tester": "foobar123",
              "sa3000udp": "password"
            }
          }
          EOF

      - name: Run tests
        run: |
          export PYTHONPATH=.
          pytest tests/test_unit.py --junitxml=test_result.xml -v || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: pipeline
    if: success()
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get commit hash
        id: vars
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: COMMIT_SHA=${{ steps.vars.outputs.commit_hash }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:${{ steps.vars.outputs.commit_hash }}
            ghcr.io/${{ github.repository_owner }}/catty-reminders-app:latest