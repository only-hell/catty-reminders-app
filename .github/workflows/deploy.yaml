name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release commit hash
        run: |
          TAG=${{ github.event.release.tag_name }}
          HASH=$(git rev-list -n 1 $TAG)
          echo "RELEASE_HASH=$HASH" >> $GITHUB_ENV

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        env:
          DEPLOY_HOST: course.prafdin.ru
          DEPLOY_USER: vboxuser
          DEPLOY_PORT: 2288
          RELEASE_HASH: ${{ env.RELEASE_HASH }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/catty-reminders-app
          DOCKER_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x deploy.sh
          ./deploy.sh