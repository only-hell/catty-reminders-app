name: CD Pipeline
on:
  push:
    branches: [ "lab3" ]
  release:
    types:[published, created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: course.prafdin.ru
          port: 2288
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="ghcr.io/${{ github.repository_owner }}/catty-reminders-app:${{ github.sha }}"
            
            echo "🧹 Убиваем старые контейнеры и чистим порт 8181..."
            docker rm -f lab3-app 2>/dev/null || true
            sudo fuser -k 8181/tcp 2>/dev/null || true
            
            echo "🔐 Логинимся в GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "🚀 Скачиваем свежий образ..."
            docker pull $IMAGE
            
            echo "🚀 Запускаем приложение!"
            docker run -d --name lab3-app --restart always -p 8181:8181 -e DEPLOY_REF=${{ github.sha }} $IMAGE
