name: CD Pipeline
on:
  push:
    branches: [ "lab3" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: course.prafdin.ru
          port: 2288
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Идем в папку и ЖЕСТКО чистим всё старое
            cd /home/vboxuser/catty-reminders-app
            git config --global --add safe.directory /home/vboxuser/catty-reminders-app
            git fetch --all
            git reset --hard origin/lab3
            git clean -fd
            # Запускаем деплой
            chmod +x deploy.sh
            ./deploy.sh ${{ github.sha }}