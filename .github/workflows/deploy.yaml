name: CD Pipeline
on:
  push:
    branches: [ "lab3*" ]
  release:
    types: [published, created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: course.prafdin.ru
          port: 2288
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="ghcr.io/only-hell/catty-reminders-app:${{ github.sha }}"
            
            echo "🔐 Login to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "📦 Pulling image..."
            docker pull $IMAGE
            
            echo "🧹 Cleaning up port 8181..."
            docker rm -f lab3-app 2>/dev/null || true
            sudo fuser -k 8181/tcp 2>/dev/null || true
            
            echo "🚀 Starting container..."
            docker run -d --name lab3-app --restart always -p 8181:8181 -e DEPLOY_REF=${{ github.sha }} $IMAGE
            
            echo "✅ Deployment complete!"