name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release commit hash
        run: |
          TAG=${{ github.event.release.tag_name }}
          HASH=$(git rev-list -n 1 $TAG)
          echo "RELEASE_HASH=$HASH" >> $GITHUB_ENV

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server via SSH
        env:
          RELEASE_HASH: ${{ env.RELEASE_HASH }}
        run: |
          ssh -o StrictHostKeyChecking=no -p 2288 vboxuser@course.prafdin.ru \
            "cd /home/vboxuser/catty-reminders-app && \
             git fetch origin && \
             git checkout ${RELEASE_HASH} && \
             COMMIT_SHA=${RELEASE_HASH} bash deploy.sh ${RELEASE_HASH}"