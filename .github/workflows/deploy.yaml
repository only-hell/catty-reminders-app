name: CD Pipeline
on:
  push:
    branches: [ "lab3" ]
  release:
    types: [published, created]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: course.prafdin.ru
          port: 2288
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            git config --global --add safe.directory /home/vboxuser/catty-reminders-app
            cd /home/vboxuser/catty-reminders-app
            # Жестко выкачиваем именно тот коммит, который просит GitHub!
            git fetch origin ${{ github.sha }}
            git reset --hard FETCH_HEAD
            git clean -fd
            chmod +x deploy.sh
            ./deploy.sh ${{ github.sha }}