name: CD Pipeline
on:
  workflow_run:
    workflows:["CI Pipeline"]
    types:
      - completed
  release:
    types: [published, created]
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: course.prafdin.ru
          port: 2288
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/vboxuser/catty-reminders-app
            git fetch --all
            git reset --hard origin/lab3
            git checkout ${{ github.sha }}
            chmod +x deploy.sh
            ./deploy.sh ${{ github.sha }}
            