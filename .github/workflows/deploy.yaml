name: CD Pipeline

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VM via SCP
        uses: appleboy/scp-action@master
        with:
          host: course.prafdin.ru
          port: 2288
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/vboxuser/catty-reminders-app"

      - name: Restart application via SSH
        uses: appleboy/ssh-action@master
        with:
          host: course.prafdin.ru
          port: 2288
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/vboxuser/catty-reminders-app
            echo "DEPLOY_REF=${{ github.sha }}" > .env
            sudo systemctl restart catty-app.service