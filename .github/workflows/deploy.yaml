name: CD Pipeline
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: course.prafdin.ru
          port: 2288
          username: vboxuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="ghcr.io/${{ github.repository_owner }}/catty-reminders-app:${{ github.sha }}"
            
            echo "🔑 Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "📥 Pulling image..."
            docker pull $IMAGE
            
            echo "🧹 Stopping old container..."
            docker rm -f lab3-app catty-app 2>/dev/null || true
            sudo fuser -k 8181/tcp 2>/dev/null || true
            
            echo "🚀 Starting new container..."
            # Нам больше не нужно пробрасывать -v config.json, бот уже внутри образа!
            docker run -d --name lab3-app --restart always -p 8181:8181 -e DEPLOY_REF=${{ github.sha }} $IMAGE